<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪瀞教練 | INSPIRE 30/60 功能性力量系統</title>
    <style>
        :root {
            --primary-color: #d4a373; /* 質感金/沙色 */
            --dark-color: #1a1a1a;
            --light-color: #f8f9fa;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--light-color); color: var(--dark-color); }
        header { background: var(--dark-color); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('gym-bg.jpg') center/cover; height: 80vh; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; max-width: 600px; }
        .btn { background: var(--primary-color); color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .section { padding: 60px 10%; text-align: center; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { color: var(--primary-color); }
        footer { background: var(--dark-color); color: gray; text-align: center; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">汪瀞健身教練</div>
    <nav>
        <a href="#about" style="color:white; text-decoration:none; margin-left:20px;">專業系統</a>
        <a href="#courses" style="color:white; text-decoration:none; margin-left:20px;">線上課程</a>
    </nav>
</header>

<section class="hero">
    <h1>21 年教學資歷，成就你的科學訓練</h1>
    <p>結合管理學碩士背景與 13 年經營經驗，為你打造最系統化的體態管理計畫</p>
    <a href="#courses" class="btn">開始訓練</a>
</section>

<section id="about" class="section">
    <h2>INSPIRE 30/60 系統</h2>
    <p>這不只是健身，是一套模組化的功能性力量與體能訓練系統。我們讓動作標準化，讓進步變得可視化。</p>
</section>

<section id="courses" class="section" style="background:#fff;">
    <h2>精選線上服務</h2>
    <div class="course-grid">
        <div class="card">
            <h3>遠距 1-on-1 教練</h3>
            <p>透過視訊進行精確動作校正與個人化課表安排。</p>
        </div>
        <div class="card">
            <h3>INSPIRE 數位計畫</h3>
            <p>適合自主訓練者，系統化的模組影片教學。</p>
        </div>
        <div class="card">
            <h3>Jing Shi 淨食指南</h3>
            <p>搭配高蛋白飲食計畫，讓你的訓練效果事半功倍。</p>
        </div>
    </div>
</section>

<footer>
    &copy; 2026 汪瀞健身工作室 | 桃園藝文特區
</footer>

</body>
</html>
