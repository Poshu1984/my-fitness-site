<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSHU WANG 汪瀞教練 | I30 訓練系統</title>
    <style>
        :root {
            --primary-color: #d4a373; /* 質感金 */
            --bg-dark: #0a0a0a;      /* 深黑背景 */
            --card-bg: #161616;      /* 卡片深灰 */
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
        }
        
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-light); 
            line-height: 1.6; 
        }

        /* 導航欄 */
        header { 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            color: white; 
            padding: 1.2rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        /* 英雄區 */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('gym-bg.jpg') center/cover; 
            height: 65vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }
        .hero h1 { font-size: 4rem; margin-bottom: 10px; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .hero p { font-size: 1.3rem; letter-spacing: 4px; color: var(--primary-color); font-weight: 300; }

        .section { padding: 100px 10%; }
        .highlight { color: var(--primary-color); font-weight: bold; }

        /* 資歷區塊 */
        .exp-container { 
            background: var(--card-bg); 
            padding: 45px; 
            border-radius: 5px; 
            border: 1px solid #333;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
        }
        .exp-title { 
            color: var(--primary-color); 
            font-weight: bold; 
            border-left: 3px solid var(--primary-color); 
            padding-left: 15px; 
            margin-bottom: 20px; 
            font-size: 1.3rem; 
            letter-spacing: 1px;
        }
        .exp-list { list-style: none; padding: 0; font-size: 1rem; color: var(--text-muted); }
        .exp-list li { margin-bottom: 10px; padding-left: 15px; position: relative; }
